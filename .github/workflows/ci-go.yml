name: CI (Go)

on:
  push:
    branches: [main]
    paths:
      - 'sdks/go/**'
      - '.github/workflows/ci-go.yml'
  pull_request:
    paths:
      - 'sdks/go/**'
      - '.github/workflows/ci-go.yml'

defaults:
  run:
    working-directory: sdks/go

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ['1.22', '1.23', '1.24']
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go ${{ matrix.go }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true
          cache-dependency-path: sdks/go/go.sum

      - name: Run tests
        run: go test -race -count=1 ./...

      - name: Build minimal-app
        working-directory: sdks/go/minimal-app
        run: go build ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: sdks/go/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61
          working-directory: sdks/go
