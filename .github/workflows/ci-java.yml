name: CI (Java)

on:
  push:
    branches: [main]
    paths:
      - 'sdks/java/**'
      - '.github/workflows/ci-java.yml'
  pull_request:
    paths:
      - 'sdks/java/**'
      - '.github/workflows/ci-java.yml'

defaults:
  run:
    working-directory: sdks/java

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: ['11', '17', '21']
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Verify library
        run: mvn -B -ntp -pl connect-sdk -am verify

      - name: Compile minimal-app
        if: matrix.java != '11'
        run: mvn -B -ntp -pl minimal-app -am -DskipTests package
