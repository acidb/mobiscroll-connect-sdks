name: Release (PHP)

on:
  push:
    tags:
      - 'php-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      MIRROR_REPO: acidb/mobiscroll-connect-php
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2

      - name: Install and test
        working-directory: sdks/php
        run: |
          composer install --no-progress --prefer-dist
          composer run lint
          composer run stan
          composer run test

      - name: Configure SSH for mirror push
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PHP_MIRROR_DEPLOY_KEY }}

      - name: Push sdks/php subtree to mirror repo
        run: |
          VERSION="${GITHUB_REF_NAME#php-v}"
          SUBTREE_SHA="$(git subtree split --prefix=sdks/php HEAD)"
          git remote add mirror git@github.com:${MIRROR_REPO}.git
          git push mirror "${SUBTREE_SHA}:refs/heads/main" --force
          git push mirror "${SUBTREE_SHA}:refs/tags/v${VERSION}"
