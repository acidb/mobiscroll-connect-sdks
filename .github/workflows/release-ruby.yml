name: Release (Ruby)

on:
  push:
    tags:
      - 'ruby-v*'

defaults:
  run:
    working-directory: sdks/ruby

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: rubygems-release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: sdks/ruby

      - name: Verify tag matches version.rb
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#ruby-v}"
          CODE_VERSION="$(grep -oE "VERSION = '[^']+'" lib/mobiscroll/connect/version.rb | sed -E "s/VERSION = '(.+)'/\1/")"
          if [ "$TAG_VERSION" != "$CODE_VERSION" ]; then
            echo "Tag ($TAG_VERSION) does not match version.rb ($CODE_VERSION)"
            exit 1
          fi

      - name: Run tests
        run: bundle exec rspec

      - name: Build gem
        run: gem build mobiscroll-connect.gemspec

      - name: Debug OIDC claims
        shell: bash
        run: |
          TOKEN=$(curl -sSL -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=rubygems.org" | jq -r .value)
          # Decode JWT payload (second segment)
          PAYLOAD=$(echo "$TOKEN" | cut -d. -f2 | tr '_-' '/+')
          # Pad with '=' to make base64 valid
          PAD=$(( (4 - ${#PAYLOAD} % 4) % 4 ))
          PAYLOAD=$(printf '%s%*s' "$PAYLOAD" "$PAD" "" | tr ' ' '=')
          echo "::group::OIDC claims"
          echo "$PAYLOAD" | base64 -d | jq '{sub, repository, repository_owner, workflow, workflow_ref, job_workflow_ref, environment, ref, ref_type, event_name}'
          echo "::endgroup::"

      - name: RubyGems login (OIDC trusted publishing)
        uses: rubygems/configure-rubygems-credentials@main

      - name: Push to RubyGems
        run: gem push mobiscroll-connect-*.gem
